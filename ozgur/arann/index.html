<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Auslander-Reiten Lattice Animation</title>

<style>
  body {
    margin: 0;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  svg {
    background: white;
  }

  .dot {
    fill: black;
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  .gone {
    opacity: 0;
  }
</style>
</head>

<body>

<svg id="lattice" width="700" height="700"></svg>
<script>
const svg = document.getElementById("lattice");

const N = 15;
const step = 40;
const r = 6;

let points = {};

// --- draw lattice ---
for (let i = 0; i < N; i++) {
  for (let j = 0; j < N; j++) {
    const cx = 50 + i * step;
    const cy = 650 - j * step;

    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", cx);
    c.setAttribute("cy", cy);
    c.setAttribute("r", r);
    c.setAttribute("class", "dot");

    svg.appendChild(c);
    points[`${i},${j}`] = c;
  }
}

// --- vanish / reset helpers ---
function vanish(i, j) {
  const key = `${i},${j}`;
  if (points[key]) {
    points[key].classList.add("gone");
  }
}

function resetAll() {
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      points[`${i},${j}`].classList.remove("gone");
    }
  }
}

// --- animation ---
let t = 0;

function stepAnimation() {

  // (0,0) to (4,0)
  if (t >= 1 && t <= 5) {
    vanish(t - 1, 0);
  }

  // whole x-axis
  if (t === 6) {
    for (let i = 0; i < N; i++) vanish(i, 0);
  }

  // (0,1)
  if (t === 7) {
    vanish(0, 1);
  }

  // everything
  if (t === 8) {
    for (let i = 0; i < N; i++) {
      for (let j = 0; j < N; j++) {
        vanish(i, j);
      }
    }
  }

  // restart
  if (t === 12) {
    resetAll();
    t = 0;
    setTimeout(stepAnimation, 600);
    return;
  }

  t++;
  setTimeout(stepAnimation, 500);
}

stepAnimation();
</script>
</body>
</html>
